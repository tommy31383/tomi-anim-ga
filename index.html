<!DOCTYPE html>
<html class="dark" lang="en-us" data-theme="dark">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tomi Anim Gà - Trình tạo nhân vật pixel art</title>
	<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
	<script>
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						"on-secondary": "#00382c",
						"surface-bright": "#31394d",
						"surface-dim": "#0b1326",
						"surface-container-highest": "#2d3449",
						"surface-container-high": "#222a3d",
						"surface-container": "#171f33",
						"surface-container-low": "#131b2e",
						"surface-container-lowest": "#060e20",
						"surface": "#0b1326",
						"on-surface": "#dae2fd",
						"on-surface-variant": "#c9c4d8",
						"primary": "#cabeff",
						"primary-container": "#947dff",
						"on-primary-container": "#2a0088",
						"secondary": "#44fad0",
						"secondary-container": "#00ddb5",
						"on-secondary-container": "#005c4a",
						"tertiary": "#bcc7de",
						"outline": "#938ea1",
						"outline-variant": "#484555",
						"error": "#ffb4ab",
						"background": "#0b1326",
						"on-background": "#dae2fd",
					},
					fontFamily: {
						"inter": ["Inter", "sans-serif"],
						"mono-id": ["JetBrains Mono", "monospace"],
						"mono-tag": ["JetBrains Mono", "monospace"],
					},
				},
			},
		};
	</script>
	<style>
		/* Hide raw text until Material Symbols font loads */
		.material-symbols-outlined {
			font-family: 'Material Symbols Outlined', monospace;
			font-weight: normal;
			font-style: normal;
			font-size: 24px;
			line-height: 1;
			letter-spacing: normal;
			text-transform: none;
			display: inline-block;
			white-space: nowrap;
			word-wrap: normal;
			direction: ltr;
			-webkit-font-feature-settings: 'liga';
			-webkit-font-smoothing: antialiased;
			font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
			overflow: hidden;
			max-width: 1.5em;
			max-height: 1.5em;
		}
		/* Hide legacy CategoryTree chrome we don't want — keep the actual tree */
		.legacy-host .category-tree-panel > .is-flex,
		.legacy-host .category-tree-panel > .mb-3:nth-of-type(1),
		.legacy-host .category-tree-panel > .mb-3:nth-of-type(2) {
			display: none !important;
		}
		.legacy-host h3.title { display: none !important; }
		.legacy-host .category-tree-loading-host h3 { display: block !important; }

		/* Variant cards: make sprite icons fill the box, not float in empty space */
		.legacy-host .variant-item {
			min-width: 110px !important;
			max-width: 130px !important;
			padding: 8px 6px !important;
			background: rgba(15, 23, 42, 0.5) !important;
			border-radius: 8px !important;
			align-items: center !important;
			justify-content: flex-start !important;
			text-align: center;
			transition: background 0.15s, border-color 0.15s;
		}
		.legacy-host .variant-item:hover {
			background: rgba(34, 42, 61, 0.8) !important;
		}
		.legacy-host .variant-item.has-background-link-light {
			background: rgba(34, 250, 208, 0.18) !important;
			outline: 2px solid #44fad0;
		}
		.legacy-host .variant-canvas {
			width: 84px !important;
			height: 84px !important;
			border: 1px solid #334155 !important;
			border-radius: 4px;
			background: #0f172a;
			display: block;
			margin: 0 auto;
		}
		.legacy-host .variant-canvas.compact-display {
			width: 56px !important;
			height: 56px !important;
		}
		.legacy-host .variant-display-name {
			font-size: 11px !important;
			color: #cbd5e1 !important;
			margin-bottom: 4px;
			width: 100%;
			display: block !important;
			white-space: normal !important;
			word-break: keep-all !important;
			overflow-wrap: normal !important;
			line-height: 1.25 !important;
			text-overflow: ellipsis;
			overflow: hidden;
			text-transform: capitalize;
		}
		.legacy-host .variant-item.has-background-link-light .variant-display-name {
			color: #44fad0 !important;
		}
		.legacy-host .variants-container {
			display: grid !important;
			grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)) !important;
			gap: 8px !important;
		}
		.pixelated, .image-rendering-pixelated {
			image-rendering: pixelated;
			image-rendering: -moz-crisp-edges;
		}
		.canvas-checkered {
			background-color: #e2e8f0;
			background-image:
				linear-gradient(45deg, #cbd5e1 25%, transparent 25%, transparent 75%, #cbd5e1 75%, #cbd5e1),
				linear-gradient(45deg, #cbd5e1 25%, transparent 25%, transparent 75%, #cbd5e1 75%, #cbd5e1);
			background-size: 20px 20px;
			background-position: 0 0, 10px 10px;
		}
		.scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
		.scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
		.scrollbar-thin::-webkit-scrollbar-thumb { background: #2d3449; border-radius: 3px; }
		.scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #484555; }
		/* Embed legacy components without showing their bulma chrome */
		.legacy-host .box {
			background: transparent !important;
			box-shadow: none !important;
			padding: 0 !important;
			color: inherit !important;
		}
		.legacy-host .title { color: #f1f5f9 !important; }
		.legacy-host .has-text-grey { color: #94a3b8 !important; }
		.legacy-host a { color: #44fad0; }
		.legacy-host .button.is-small { font-size: 11px; }
		.legacy-host { color: #cbd5e1; }
	</style>
</head>
<body class="bg-background text-on-background font-inter overflow-hidden h-screen w-screen flex flex-col">
	<div id="app-shell" class="contents"></div>
	<script type="module" src="sources/main.js"></script>
</body>
</html>
