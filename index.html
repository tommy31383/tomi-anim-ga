<!DOCTYPE html>
<html class="dark" lang="en-us" data-theme="dark">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tomi Anim Gà - Trình tạo nhân vật pixel art</title>
	<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
	<script>
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						"on-secondary": "#00382c",
						"surface-bright": "#31394d",
						"surface-dim": "#0b1326",
						"surface-container-highest": "#2d3449",
						"surface-container-high": "#222a3d",
						"surface-container": "#171f33",
						"surface-container-low": "#131b2e",
						"surface-container-lowest": "#060e20",
						"surface": "#0b1326",
						"on-surface": "#dae2fd",
						"on-surface-variant": "#c9c4d8",
						"primary": "#cabeff",
						"primary-container": "#947dff",
						"on-primary-container": "#2a0088",
						"secondary": "#44fad0",
						"secondary-container": "#00ddb5",
						"on-secondary-container": "#005c4a",
						"tertiary": "#bcc7de",
						"outline": "#938ea1",
						"outline-variant": "#484555",
						"error": "#ffb4ab",
						"background": "#0b1326",
						"on-background": "#dae2fd",
					},
					fontFamily: {
						"inter": ["Inter", "sans-serif"],
						"mono-id": ["JetBrains Mono", "monospace"],
						"mono-tag": ["JetBrains Mono", "monospace"],
					},
				},
			},
		};
	</script>
	<style>
		/* Hide raw text until Material Symbols font loads */
		.material-symbols-outlined {
			font-family: 'Material Symbols Outlined', monospace;
			font-weight: normal;
			font-style: normal;
			font-size: 24px;
			line-height: 1;
			letter-spacing: normal;
			text-transform: none;
			display: inline-block;
			white-space: nowrap;
			word-wrap: normal;
			direction: ltr;
			-webkit-font-feature-settings: 'liga';
			-webkit-font-smoothing: antialiased;
			font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
			overflow: hidden;
			max-width: 1.5em;
			max-height: 1.5em;
		}
		/* Hide legacy CategoryTree chrome we don't want — keep the actual tree */
		.legacy-host .category-tree-panel > .is-flex,
		.legacy-host .category-tree-panel > .mb-3:nth-of-type(1),
		.legacy-host .category-tree-panel > .mb-3:nth-of-type(2) {
			display: none !important;
		}
		.legacy-host h3.title { display: none !important; }
		.legacy-host .category-tree-loading-host h3 { display: block !important; }

		/* ============================================================
		   Variant card system (used by Asset Library tree + palette modal)
		   ============================================================ */
		.legacy-host .variants-container,
		.legacy-host .palette-modal .variants-container {
			display: grid !important;
			grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)) !important;
			gap: 10px !important;
			padding: 4px 0 !important;
		}

		/* ItemWithRecolors row: canvas on left, palette list on right.
		   Wrap in a real card on dark theme so it doesn't look like raw flex. */
		.legacy-host > .has-text-grey { color: #94a3b8 !important; }
		.legacy-host .palette-recolor-list {
			flex: 1 1 auto !important;
			display: flex !important;
			flex-direction: column !important;
			gap: 6px !important;
			margin-left: 12px !important;
			min-width: 0 !important;
		}
		.legacy-host .palette-recolor-item {
			display: flex !important;
			align-items: center !important;
			gap: 8px !important;
			padding: 4px 6px !important;
			background: rgba(15, 23, 42, 0.6) !important;
			border: 1px solid #334155 !important;
			border-radius: 6px !important;
			cursor: pointer !important;
			transition: background 0.15s, border-color 0.15s;
		}
		.legacy-host .palette-recolor-item:hover {
			background: #283447 !important;
			border-color: #475569 !important;
		}
		.legacy-host .palette-recolor-item label {
			width: 78px !important;
			min-width: 78px !important;
			max-width: 78px !important;
			text-align: left !important;
			margin: 0 !important;
			color: #cbd5e1 !important;
			font-size: 11px !important;
			font-weight: 600 !important;
			white-space: nowrap !important;
			overflow: hidden !important;
			text-overflow: ellipsis !important;
			text-transform: capitalize;
		}
		.legacy-host .palette-recolor-item .palette-swatch {
			flex: 1 1 auto !important;
			min-width: 80px !important;
			max-width: none !important;
			height: 16px !important;
			border: 1px solid #334155 !important;
			border-radius: 4px !important;
			background: #0f172a !important;
			overflow: hidden !important;
			display: flex !important;
		}
		.legacy-host .palette-recolor-item .palette-swatch span {
			height: 100% !important;
		}

		/* The recolor row's wrapper (is-flex parent of canvas + recolor-list) */
		.legacy-host .tree-label + div > .is-flex.is-align-items-center {
			display: flex !important;
			align-items: stretch !important;
			gap: 0 !important;
			padding: 8px !important;
			background: #1e293b !important;
			border: 1px solid #334155 !important;
			border-radius: 10px !important;
			margin: 4px 0 !important;
			cursor: pointer;
			transition: border-color 0.15s, background 0.15s;
		}
		.legacy-host .tree-label + div > .is-flex.is-align-items-center:hover {
			background: #283447 !important;
			border-color: #475569 !important;
		}
		.legacy-host .tree-label + div .variant-item {
			flex: 0 0 auto !important;
			width: auto !important;
			max-width: none !important;
			min-width: 0 !important;
			padding: 0 !important;
			background: transparent !important;
			border: none !important;
			box-shadow: none !important;
		}
		.legacy-host .tree-label + div .variant-item .variant-canvas {
			width: 80px !important;
			height: 80px !important;
		}

		.legacy-host .variant-item,
		.palette-modal .variant-item,
		.palette-modal .grid > .cell {
			min-width: 0 !important;
			max-width: none !important;
			width: 100% !important;
			padding: 8px !important;
			background: #1e293b !important;
			border: 1px solid #334155 !important;
			border-radius: 10px !important;
			display: flex !important;
			flex-direction: column !important;
			align-items: center !important;
			gap: 6px !important;
			cursor: pointer;
			transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
			text-align: center;
			outline: none !important;
		}
		.legacy-host .variant-item:hover,
		.palette-modal .variant-item:hover,
		.palette-modal .grid > .cell:hover {
			background: #283447 !important;
			border-color: #475569 !important;
		}
		/* Selected: teal border + tinted bg + glow */
		.legacy-host .variant-item.has-background-link-light,
		.palette-modal .variant-item.has-background-link-light {
			background: rgba(68, 250, 208, 0.12) !important;
			border-color: #44fad0 !important;
			box-shadow: 0 0 0 2px rgba(68, 250, 208, 0.25) !important;
		}
		/* Hover-only state legacy applies via class — kill it on dark theme */
		.legacy-host .variant-item.has-background-white-ter {
			background: #283447 !important;
		}

		/* Label: 1-2 lines, horizontal, never truncated to first letter */
		.legacy-host .variant-display-name,
		.palette-modal .variant-display-name {
			width: 100% !important;
			display: block !important;
			font-size: 12px !important;
			line-height: 1.25 !important;
			color: #e2e8f0 !important;
			font-weight: 600 !important;
			text-align: center !important;
			text-transform: capitalize !important;
			white-space: normal !important;
			word-break: normal !important;
			overflow-wrap: anywhere !important;
			overflow: visible !important;
			text-overflow: clip !important;
			min-height: 1.25em;
			padding: 0 2px;
		}
		.legacy-host .variant-item.has-background-link-light .variant-display-name,
		.palette-modal .variant-item.has-background-link-light .variant-display-name {
			color: #44fad0 !important;
		}

		/* Canvas: solid dark bg, centered, fills card width */
		.legacy-host .variant-canvas,
		.palette-modal .variant-canvas {
			width: 88px !important;
			height: 88px !important;
			border: 1px solid #334155 !important;
			border-radius: 6px !important;
			background: #0b1220 !important;
			image-rendering: pixelated !important;
			display: block !important;
			margin: 0 auto !important;
			padding: 0 !important;
		}
		.legacy-host .variant-canvas.compact-display,
		.palette-modal .variant-canvas.compact-display {
			width: 56px !important;
			height: 56px !important;
		}

		/* Palette swatch (gradient bar) below canvas in modal cards */
		.palette-modal .palette-swatch {
			width: 100% !important;
			height: 14px !important;
			border: 1px solid #334155 !important;
			border-radius: 4px !important;
			background: #0f172a !important;
			overflow: hidden !important;
		}

		/* ============================================================
		   Palette picker modal — Stitch redesign port (v0.1.15)
		   ============================================================ */
		.palette-modal-overlay {
			background: rgba(11, 19, 38, 0.8) !important;
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			z-index: 999 !important;
			position: fixed !important;
			inset: 0;
		}
		.palette-modal {
			background: #171f33 !important;
			border: 1px solid #484555 !important;
			color: #dae2fd !important;
			box-shadow: 0 32px 80px rgba(0, 0, 0, 0.75) !important;
			top: 6vh !important;
			left: 50% !important;
			right: auto !important;
			transform: translateX(-50%) !important;
			width: min(880px, 94vw) !important;
			max-height: 88vh !important;
			border-radius: 16px !important;
			overflow: hidden !important;
			display: flex !important;
			flex-direction: column !important;
		}

		/* Header: icon tile + title + subtitle, square close button */
		.palette-modal header {
			background: #171f33 !important;
			border-bottom: 1px solid #484555 !important;
			padding: 20px 24px !important;
			color: #fff !important;
			gap: 16px !important;
			align-items: center !important;
			flex-shrink: 0 !important;
		}
		.palette-modal header h4 {
			color: #dae2fd !important;
			font-weight: 600 !important;
			font-size: 18px !important;
			letter-spacing: -0.01em !important;
			margin: 0 !important;
			line-height: 1.2 !important;
		}
		/* "✨" icon tile virtualised in front of header h4 via ::before */
		.palette-modal header h4::before {
			content: "🎨";
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 40px;
			height: 40px;
			background: #222a3d;
			border: 1px solid #484555;
			border-radius: 10px;
			margin-right: 12px;
			font-size: 18px;
			vertical-align: middle;
		}
		.palette-modal header button {
			background: transparent !important;
			color: #c9c4d8 !important;
			border: 1px solid #484555 !important;
			border-radius: 10px !important;
			width: 40px !important;
			height: 40px !important;
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			font-size: 16px !important;
			line-height: 1 !important;
			cursor: pointer !important;
			text-transform: uppercase;
			transition: background 0.15s, color 0.15s;
		}
		.palette-modal header button:hover {
			background: #2d3449 !important;
			color: #fff !important;
		}

		/* Body section is the scrollable grid */
		.palette-modal section {
			padding: 24px !important;
			overflow-y: auto !important;
			background: #171f33 !important;
			flex: 1 1 auto !important;
		}
		.palette-modal section .palette-version {
			color: #c9c4d8 !important;
			font-size: 11px !important;
			font-weight: 500 !important;
			padding: 4px 0 12px !important;
			text-transform: uppercase !important;
			letter-spacing: 0.05em !important;
		}
		.palette-modal .palette-modal-version-block {
			margin-bottom: 16px !important;
		}

		/* Card grid */
		.palette-modal .variants-container,
		.palette-modal .variants-container.grid {
			display: grid !important;
			grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)) !important;
			gap: 16px !important;
			padding: 0 !important;
		}

		/* Card */
		.palette-modal .variant-item,
		.palette-modal .grid > .cell {
			position: relative !important;
			width: 100% !important;
			min-width: 0 !important;
			max-width: none !important;
			padding: 16px !important;
			background: #1a2238 !important;
			border: 1px solid #484555 !important;
			border-radius: 12px !important;
			display: flex !important;
			flex-direction: column !important;
			gap: 8px !important;
			cursor: pointer !important;
			transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s !important;
			outline: none !important;
		}
		.palette-modal .variant-item:hover:not(.has-background-link-light),
		.palette-modal .grid > .cell:hover {
			border-color: #00E0B8 !important;
			transform: translateY(-2px) !important;
		}

		/* Selected card */
		.palette-modal .variant-item.has-background-link-light {
			background: #1a2238 !important;
			border: 2px solid #44fad0 !important;
			box-shadow: 0 0 15px rgba(68, 250, 208, 0.25) !important;
			padding: 15px !important; /* compensate for +1px border */
		}
		.palette-modal .variant-item.has-background-link-light::before {
			content: "✓";
			position: absolute !important;
			top: 8px !important;
			right: 8px !important;
			width: 22px !important;
			height: 22px !important;
			background: #44fad0 !important;
			color: #002019 !important;
			border-radius: 999px !important;
			display: flex !important;
			align-items: center !important;
			justify-content: center !important;
			font-size: 14px !important;
			font-weight: 800 !important;
			z-index: 5 !important;
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3) !important;
		}

		/* Canvas: full-width checkered tile, 96px tall, centered sprite */
		.palette-modal .variant-canvas {
			width: 100% !important;
			height: 96px !important;
			background-image:
				linear-gradient(45deg, #0f172a 25%, transparent 25%),
				linear-gradient(-45deg, #0f172a 25%, transparent 25%),
				linear-gradient(45deg, transparent 75%, #0f172a 75%),
				linear-gradient(-45deg, transparent 75%, #0f172a 75%) !important;
			background-size: 10px 10px !important;
			background-position: 0 0, 0 5px, 5px -5px, -5px 0px !important;
			background-color: #1e293b !important;
			border: 1px solid #2d3449 !important;
			border-radius: 8px !important;
			image-rendering: pixelated !important;
			padding: 0 !important;
			margin: 0 !important;
			object-fit: contain !important;
			object-position: center !important;
			display: block !important;
			order: 1 !important;
		}

		/* Variant name */
		.palette-modal .variant-display-name {
			order: 2 !important;
			width: 100% !important;
			display: block !important;
			font-size: 14px !important;
			line-height: 1.3 !important;
			color: #dae2fd !important;
			font-weight: 600 !important;
			text-align: center !important;
			text-transform: capitalize !important;
			white-space: normal !important;
			word-break: normal !important;
			overflow-wrap: anywhere !important;
			overflow: visible !important;
			text-overflow: clip !important;
			padding: 0 !important;
			margin: 0 !important;
		}
		.palette-modal .variant-item.has-background-link-light .variant-display-name {
			color: #44fad0 !important;
		}

		/* Gradient strip */
		.palette-modal .palette-swatch {
			order: 3 !important;
			width: 100% !important;
			height: 16px !important;
			border: 1px solid rgba(0, 0, 0, 0.25) !important;
			border-radius: 4px !important;
			background: #0f172a !important;
			overflow: hidden !important;
			display: flex !important;
		}
		.palette-modal .palette-swatch span {
			height: 100% !important;
			flex: 1 1 auto !important;
		}

		/* Footer hint (rendered as a CSS-only sticky note since legacy markup
		   has no <footer>). Pin to the modal's bottom edge via fixed flex. */
		.palette-modal::after {
			content: "Bấm vào ô màu để áp dụng • Esc để đóng";
			display: block !important;
			padding: 14px 24px !important;
			border-top: 1px solid #484555 !important;
			background: #171f33 !important;
			color: #c9c4d8 !important;
			font-size: 12px !important;
			text-align: left !important;
			flex-shrink: 0 !important;
		}

		.palette-modal .tree-arrow {
			filter: brightness(2);
		}
		.pixelated, .image-rendering-pixelated {
			image-rendering: pixelated;
			image-rendering: -moz-crisp-edges;
		}
		.canvas-checkered {
			background-color: #e2e8f0;
			background-image:
				linear-gradient(45deg, #cbd5e1 25%, transparent 25%, transparent 75%, #cbd5e1 75%, #cbd5e1),
				linear-gradient(45deg, #cbd5e1 25%, transparent 25%, transparent 75%, #cbd5e1 75%, #cbd5e1);
			background-size: 20px 20px;
			background-position: 0 0, 10px 10px;
		}
		.scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
		.scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
		.scrollbar-thin::-webkit-scrollbar-thumb { background: #2d3449; border-radius: 3px; }
		.scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #484555; }
		/* Embed legacy components without showing their bulma chrome */
		.legacy-host .box {
			background: transparent !important;
			box-shadow: none !important;
			padding: 0 !important;
			color: inherit !important;
		}
		.legacy-host .title { color: #f1f5f9 !important; }
		.legacy-host .has-text-grey { color: #94a3b8 !important; }
		.legacy-host a { color: #44fad0; }
		.legacy-host .button.is-small { font-size: 11px; }
		.legacy-host { color: #cbd5e1; }
	</style>
</head>
<body class="bg-background text-on-background font-inter overflow-hidden h-screen w-screen flex flex-col">
	<div id="app-shell" class="contents"></div>
	<script type="module" src="sources/main.js"></script>
</body>
</html>
